name: Kernel build for redbull device

on:
  workflow_dispatch:
    inputs:
      device:
        type: choice
        description: 'Select device'
        required: true
        default: 'redfin'
        options:
          - redfin

      android_version:
        type: choice
        description: 'Select Android version'
        required: true
        default: 'android-msm-redbull-4.19-android14'
        options:
          - android-msm-redbull-4.19-android14

      susfs_enable:
        type: choice
        description: 'Enable SUSFS'
        required: true
        default: 'true'
        options:
          - 'true'
          - 'false'

      kernel_root:
        type: choice
        description: 'Kernel root'
        required: true
        default: 'kernelSU'
        options:
          - 'kernelSU'
          - 'kernelSU-next'


jobs:
  build-kernel-4-19-redbull:
    runs-on: ubuntu-22.04

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192    # 8GB for root memory reservation
          temp-reserve-mb: 2048     # 2GB for temporary memory reservation
          swap-size-mb: 8192       # 8GB for swap size
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Display build
        run: |
          echo "Device name: ${{ github.event.inputs.device }}"
          echo "Android version: ${{ github.event.inputs.android_version }}"
          echo "SUSFS enable: ${{ github.event.inputs.susfs_enable }}"
          echo "Kernel root: ${{ github.event.inputs.kernel_root }}"

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get build space
        run: |
          free -h
          df -h
      
      - name: Set environment
        run: |
          # Set CONFIG dynamically based on matrix values
          CONFIG=${{ github.event.inputs.device }}
          ANDROID_BRANCH=${{ github.event.inputs.android_version }}
          
          # Set CONFIG as an environment variable for future steps
          echo "CONFIG=$CONFIG" >> $GITHUB_ENV
          
          echo "CONFIG set to: $CONFIG"

          # Set RAMDISK_PATH environment variable for future steps
          echo "RAMDISK_PATH=$GITHUB_WORKSPACE/ramdisk/$CONFIG/$ANDROID_BRANCH" >> $GITHUB_ENV
          echo "ANDROID_BRANCH=$ANDROID_BRANCH" >> $GITHUB_ENV
          KERNEL_ROOT=${{ github.event.inputs.kernel_root }}
          echo "KERNEL_ROOT=$KERNEL_ROOT" >> $GITHUB_ENV

      - name: Install Repo
        run: |
          # Install dependencies
          mkdir -p ./git-repo
          curl https://storage.googleapis.com/git-repo-downloads/repo > ./git-repo/repo
          chmod a+rx ./git-repo/repo
          echo "REPO=$GITHUB_WORKSPACE/./git-repo/repo" >> $GITHUB_ENV

      - name: Install Others
        run: |
          # Install dependencies
          sudo apt update
          sudo apt install build-essential flex bison libssl-dev libelf-dev libncurses5-dev gcc-aarch64-linux-gnu make

      - name: Clone SUSFS
        if: ${{ github.event.inputs.susfs_enable == 'true' }}
        run: |
          echo "Cloning SUSFS..."
          SUSFS_BRANCH="kernel-4.19"
          # Debug print the branches
          echo "Using branch for SUSFS: $SUSFS_BRANCH"
          # Clone repositories using the branch names
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b "$SUSFS_BRANCH"

      - run: ls -l

      - name: 🔍 Locate ramdisk
        id: locate_ramdisk
        run: |
          echo "📁 Current working directory: $(pwd)"
          echo "📦 Searching for ramdisk ..."
          
          # Find in $RAMDISK_PATH
          echo "🔍 Searching in: $RAMDISK_PATH"
          
          FOUND=$(find "$RAMDISK_PATH" -type f -name "ramdisk" | head -n 1)
    
          if [ -z "$FOUND" ]; then
            echo "❌ The `ramdisk` file was not found, and the build was terminated. This is an important file. Without integrating it into the build, the device won't boot. Haha."
            exit 1
          else
            echo "✅ The `ramdisk` file was found: $FOUND"
          fi

      - name: Initialize and Sync Kernel Source
        run: |

          echo "Create a configuration directory:$CONFIG"
          mkdir -p "$CONFIG"

          echo "Copy ramdisk files：$RAMDISK_PATH to $CONFIG/"
          cp -fv "$RAMDISK_PATH/ramdisk" "$CONFIG/"
          cp -fv "$RAMDISK_PATH/vendor_ramdisk" "$CONFIG/"
          
          cd "$CONFIG"
          
          # Initialize and sync kernel source
          echo "Initializing and syncing kernel source..."
          $REPO init -u https://android.googlesource.com/kernel/manifest -b $ANDROID_BRANCH

          # Sync repo and apply patches
          $REPO --version
          $REPO --trace sync -c -j$(nproc --all) --no-tags --fail-fast
          
          cp -fv ramdisk prebuilts/boot-artifacts/ramdisks/ramdisk-aosp_arm64.img
          cp -fv vendor_ramdisk prebuilts/boot-artifacts/ramdisks/vendor_ramdisk-barbet.img
          cp -fv vendor_ramdisk prebuilts/boot-artifacts/ramdisks/vendor_ramdisk-redfin.img
          cp -fv vendor_ramdisk prebuilts/boot-artifacts/ramdisks/vendor_ramdisk-bramble.img

      - name: Add KernelSU
        if: ${{ github.event.inputs.kernel_root == 'kernelSU' }}
        run: |
          echo "Changing to configuration directory: $CONFIG..."
          cd "$CONFIG/private/msm-google/"
          
          echo "Adding KernelSU..."
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5

      - name: Add KernelSU-Next
        if: ${{ github.event.inputs.kernel_root == 'kernelSU-Next' }}
        run: |
          echo "Changing to configuration directory: $CONFIG..."
          cd "$CONFIG/private/msm-google/"
          
          echo "Adding KernelSU..."
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -


      - name: Apply SUSFS Patches
        if: ${{ github.event.inputs.susfs_enable == 'true' }}
        run: |
          echo "Changing to configuration directory: $CONFIG..."
          cd "$CONFIG/private/msm-google/"
          
          echo "Applying SUSFS patches..."
          
          # Copy SUSFS patches
          # Check env $KERNEL_ROOT
          if [ "$KERNEL_ROOT" == "kernelSU" ]; then
            cp ../../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./KernelSU/
          elif [ "$KERNEL_ROOT" == "kernelSU-next" ]; then
            cp ../../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./KernelSU-Next/
          fi
          cp ../../../susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.19.patch ./
          cp ../../../susfs4ksu/kernel_patches/fs/* ./fs/
          cp ../../../susfs4ksu/kernel_patches/include/linux/* ./include/linux/

          cd ./KernelSU
          
          # Apply SUSFS patch for KernelSU
          patch -p1 --fuzz=3 < 10_enable_susfs_for_ksu.patch || true
          
          # Change to common directory and apply SUSFS patch
          cd ..
          patch -p1 --fuzz=3 < 50_add_susfs_in_kernel-4.19.patch || true

      - name: Apply KSU Hooks
        run: |
          echo "Changing to configuration directory: $CONFIG..."
          cd "$CONFIG/private/msm-google/"
          # Apply additional patch
          cp ../../../kernel_patches/ksu_hooks_4.19.patch ./
          patch -p1 --fuzz=3 < ./ksu_hooks_4.19.patch

      - name: Add Configuration Settings
        run: |
          echo "Changing to configuration directory: $CONFIG..."
          cd "$CONFIG/private/msm-google/"
          
          echo "Adding configuration settings to redbull-gki_defconfig..."
          
          # Enable KSU configuration
          echo "CONFIG_KSU=y" >> ./arch/arm64/configs/redbull-gki_defconfig

          # Add additional tmpfs config setting
          echo "CONFIG_TMPFS_XATTR=y" >> ./arch/arm64/configs/redbull-gki_defconfig

      - name: Apply SUSFS Configuration Settings
        if: ${{ github.event.inputs.susfs_enable == 'true' }}
        run: |
          echo "Changing to configuration directory: $CONFIG..."
          cd "$CONFIG/private/msm-google/"
          echo "Adding SUSFS configuration settings to redbull-gki_defconfig..."
          # Add SUSFS configuration settings
          echo "CONFIG_KSU_SUSFS=y" >> ./arch/arm64/configs/redbull-gki_defconfig
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> ./arch/arm64/configs/redbull-gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> ./arch/arm64/configs/redbull-gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> ./arch/arm64/configs/redbull-gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> ./arch/arm64/configs/redbull-gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> ./arch/arm64/configs/redbull-gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> ./arch/arm64/configs/redbull-gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y" >> ./arch/arm64/configs/redbull-gki_defconfig
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> ./arch/arm64/configs/redbull-gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> ./arch/arm64/configs/redbull-gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> ./arch/arm64/configs/redbull-gki_defconfig
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> ./arch/arm64/configs/redbull-gki_defconfig
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> ./arch/arm64/configs/redbull-gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> ./arch/arm64/configs/redbull-gki_defconfig
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> ./arch/arm64/configs/redbull-gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> ./arch/arm64/configs/redbull-gki_defconfig
          
      - name: Run sed and perl Commands
        run: |
          GITHUB_SHA_SHORT=$(echo ${{ github.sha }} | cut -c 1-7)
          echo "Changing to configuration directory: $CONFIG..."
          cd "$CONFIG/private/msm-google/"
          
          echo "Running sed commands..."
          
          # Run sed commands for modifications
          sed -i 's/check_defconfig//' ./build.config.common
          sed -i 's/check_defconfig//' ./build.config.redbull
          sed -i 's/check_defconfig && //' ./build.config.redbull.no-cfi
          # Added commit id
          sed -i '$s|echo "\$res"|echo "\-g7b0944645172-@sn00py_z0r0-$GITHUB_SHA_SHORT"|' ./scripts/setlocalversion
          sed -i 's/-stable//' ./scripts/setlocalversion
          
          # Run perl command to modify UTS_VERSION
          perl -pi -e 's{UTS_VERSION="\$\(echo \$UTS_VERSION \$CONFIG_FLAGS \$TIMESTAMP \| cut -b -\$UTS_LEN\)"}{UTS_VERSION="#1 SMP PREEMPT Sat Apr 20 04:20:00 UTC 2025"}' ./scripts/mkcompile_h

      - name: Build the Kernel
        run: |
          echo "Changing to configuration directory: $CONFIG..."
          cd "$CONFIG"
          
          echo "Building the kernel..."
          BUILD_AOSP_KERNEL=1 ./build_redbull-gki.sh
          
      - name: Create zip file for result
        run: |
          echo "Changing to configuration directory: $CONFIG..."
          cd "$CONFIG"
          mkdir fastboot_files
          cp -r ./out/android-msm-pixel-4.19/dist/boot.img fastboot_files/
          cp -r ./out/android-msm-pixel-4.19/dist/vendor_boot.img fastboot_files/
          cp -r ./out/android-msm-pixel-4.19/dist/dtbo.img fastboot_files/
          echo "Creating zip file for fastboot files..."
          cd fastboot_files/
          zip -r "fastboot.zip" .
        
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: fastboot.zip
          path: ${{ env.CONFIG }}/fastboot_files/fastboot.zip
